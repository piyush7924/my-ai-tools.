<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhai's All-in-One Tool</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #ddd; transition: 0.3s; }
        .active { background: #007bff; color: white; }
        textarea { width: 100%; height: 120px; border-radius: 10px; border: 1px solid #ccc; padding: 12px; box-sizing: border-box; font-size: 16px; margin-top: 10px; }
        button#main-btn { background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 18px; margin-top: 15px; font-weight: bold; }
        #output { margin-top: 20px; padding: 15px; background: #f8f9fa; border-left: 5px solid #007bff; text-align: left; display: none; white-space: pre-wrap; }
        .disclaimer { font-size: 12px; color: red; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">🤖 AI Humanizer</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('humanizer')">✍️ Humanizer</button>
        <button class="tab-btn" onclick="switchTab('health')">🏥 Health Care</button>
    </div>

    <textarea id="userInput" placeholder="Yahan apna text ya bimari ke baare mein likho..."></textarea>
    
    <button id="main-btn" onclick="processAI()">✨ Magic Start Karo</button>

    <div id="output"></div>
    <div id="disclaimer" class="disclaimer" style="display:none;">Note: Ye AI advice hai, asli doctor se zaroor milein.</div>
</div>

<script>
    let currentMode = 'humanizer';
    // 🔥 APNI KEY YAHAN CHIPKAO (Single quotes ke beech mein)
    const apiKey = 'AIzaSyDEI-xQYeIOFyK6HnisN4piRWOTGG7MNDU';

    function switchTab(mode) {
        currentMode = mode;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('title').innerText = mode === 'humanizer' ? '🤖 AI Humanizer' : '🏥 AI Health Assistant';
        document.getElementById('disclaimer').style.display = mode === 'health' ? 'block' : 'none';
        document.getElementById('userInput').placeholder = mode === 'humanizer' ? "Paste ChatGPT text here..." : "Apni problem batao (e.g. Headache tips)...";
    }

    async function processAI() {
        const input = document.getElementById('userInput').value;
        const out = document.getElementById('output');
        if(!input) return alert("Bhai, kuch likho toh!");

        out.style.display = "block";
        out.innerText = "⏳ Soch raha hoon... thoda ruko...";

        let prompt = "";
        if(currentMode === 'humanizer') {
            prompt = "Rewrite this text to sound 100% like a natural human, casual and simple. Bypass AI detection: " + input;
        } else {
            prompt = "Act as a friendly health assistant. Give helpful tips and home remedies for: " + input + ". Also add a warning to see a doctor.";
        }

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            out.innerText = data.candidates[0].content.parts[0].text;
        } catch (e) {
            out.innerText = "Error: Key check karo ya net nahi chal raha!";
        }
    }
</script>

</body>
</html>
