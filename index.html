<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Assistant</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #d9534f; }
        textarea { width: 100%; height: 120px; border-radius: 10px; border: 1px solid #ccc; padding: 12px; box-sizing: border-box; font-size: 16px; margin-top: 10px; }
        button { background: #0275d8; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 18px; margin-top: 15px; font-weight: bold; }
        #output { margin-top: 20px; padding: 15px; background: #f8f9fa; border-left: 5px solid #d9534f; text-align: left; display: none; white-space: pre-wrap; }
        .disclaimer { font-size: 12px; color: #777; margin-top: 15px; font-style: italic; }
    </style>
</head>
<body>
<div class="container">
    <h2>🏥 AI Health Assistant</h2>
    <p>Apni bimari ya lakshan yahan likhein:</p>
    <textarea id="userInput" placeholder="E.g. Mujhe kal se sar dard hai, kya karun?"></textarea>
    <button onclick="askHealthAI()">✨ Upchar Batayein</button>
    <div id="output"></div>
    <div class="disclaimer">Note: Ye AI advice hai, asli doctor se zaroor milein.</div>
</div>

<script>
    // ✅ Yeh rahi teri sahi API Key
    const apiKey = 'AIzaSyB-ON2s1XZHU_c5LN2c6zHYEp9N8YKerYk' 

    async function askHealthAI() {
        const input = document.getElementById('userInput').value;
        const out = document.getElementById('output');
        if(!input) return alert("Bhai, apni problem toh likho!");
        
        out.style.display = "block";
        out.innerText = "⏳ Soch raha hoon... thoda ruko...";

        const prompt = "Act as a friendly health assistant. Provide helpful home remedies and health tips for: " + input;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            
            if(data.candidates && data.candidates[0].content.parts[0].text) {
                out.innerText = data.candidates[0].content.parts[0].text;
            } else {
                out.innerText = "Error: AI response nahi de raha. Key check karein.";
            }
        } catch (e) {
            out.innerText = "Error: Internet ya API ka issue hai!";
        }
    }
</script>
</body>
</html>
